<div class="preview-window">
  <div class="preview-titlebar">
    <span class="preview-dot preview-dot--red"></span>
    <span class="preview-dot preview-dot--yellow"></span>
    <span class="preview-dot preview-dot--green"></span>
    <span class="preview-titlebar-text">Theme Designer</span>
  </div>
  <div class="preview-body">
    <div class="preview-sidebar">
      <div class="preview-tab preview-tab--active">
        <i class="pi pi-palette"></i>
        <span>Colors</span>
      </div>
      <div class="preview-tab">
        <i class="pi pi-at"></i>
        <span>Typography</span>
      </div>
      <div class="preview-tab">
        <i class="pi pi-box"></i>
        <span>Components</span>
      </div>
      <div class="preview-tab">
        <i class="pi pi-sliders-h"></i>
        <span>Spacing</span>
      </div>
    </div>
    <div class="preview-main">
      <div class="preview-section-label">Primary Palette</div>
      <div class="preview-swatch-grid">
        <div class="preview-swatch" style="background: var(--p-primary-50)">
          <span>50</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-100)">
          <span>100</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-200)">
          <span>200</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-300)">
          <span>300</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-400)">
          <span>400</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-500)">
          <span>500</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-600)">
          <span>600</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-700)">
          <span>700</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-800)">
          <span>800</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-900)">
          <span>900</span>
        </div>
        <div class="preview-swatch" style="background: var(--p-primary-950)">
          <span>950</span>
        </div>
        <div class="preview-swatch preview-swatch--main" style="background: var(--p-primary-color)">
          <span>Primary</span>
        </div>
      </div>
    </div>
  </div>
</div>
